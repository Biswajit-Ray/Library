<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Alexandria | Digital Library</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <header class="navbar">
        <h1 class="logo">Alexandria<span>.</span></h1>
        <button class="add-book-btn" id="newBookBtn" command="show-modal" commandfor="bookLoggerForm">+ Add Book</button>

        <dialog id="bookLoggerForm">
            <div class="modal-content">
                <form >
                    <div class="form-element"><label for="title">Title:</label><input id="title" type="text"></div>
                    <div class="form-element"><label for="author">Author:</label><input id="author" type="text"></div>
                    <div class="form-element"><label for="pages">Page Count:</label><input id="pages" type="number"></div>
                    <div class="form-element"><button type="submit">Submit</button></div>
                </form>
            </div>
        </dialog>
    </header>

    <main class="container">
        <div class="stats-bar">
            <p>Total Books: <span id="bookCount">15</span></p>
        </div>

        <section class="library-grid" id="libraryGrid">
            
            <div class="card">
                <p class="title">The Great Gatsby</p>
                <p class="author">F. Scott Fitzgerald</p>
                <div class="low-bar">
                    <p class="pages">180 pages</p>
                    <p class="readStatus read-false">Not Read</p>
                </div>
            </div>

        </section>
    </main>

    <script src="./engine.js"></script>
</body>
</html>
